<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AAPA</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- PWA: standalone на iOS (apple-mobile-web-app-capable) + иконка домашнего экрана -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AAPA" />
    <meta name="theme-color" content="#0A2463" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Preload жирного КИРИЛЛИЧЕСКОГО Montserrat 700: текст вопросов жирный, и если этот
     subset не успевает подгрузиться, кириллица рисуется как .notdef → «?????».
     URL version-pinned (v31) — при обновлении шрифта Google может протухнуть; тогда
     просто перестаёт работать preload, а CSS-fallback (Inter) в index.css всё равно
     гарантирует корректный рендер. -->
<link rel="preload" as="font" type="font/woff2" crossorigin
  href="https://fonts.gstatic.com/s/montserrat/v31/JTUHjIg1_i6t8kCHKm4532VJOt5-QNFgpCuM73w9aXpsog.woff2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Бренд-сплэш ДО загрузки JS: navy-фон (= theme-color) убирает белую вспышку,
         пока качается бандл. Пульсирующее лого AAPA. React монтируется в #root и
         вытесняет сплэш; React-лоадер (App.jsx authLoading) повторяет ТОТ ЖЕ navy+лого
         (класс .aapa-splash в index.css) → бесшовный переход без морганий.
         🔴 Держать цвета/размеры/SVG в синхроне с .aapa-splash (index.css) и App.jsx. -->
    <style>
      html, body { margin:0; background:#0A2463; }
      #aapa-splash { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0A2463; z-index:2147483647; }
      #aapa-splash .m { width:88px; height:88px; transform-origin:center; animation:aapa-pulse 1.7s ease-in-out infinite; }
      #aapa-splash .w { margin-top:20px; font-family:'Montserrat',system-ui,sans-serif; font-weight:800; font-size:28px; letter-spacing:3px; color:#FBBF24; }
      #aapa-splash .s { margin-top:7px; font-family:'Inter',system-ui,sans-serif; font-weight:700; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(226,232,240,0.65); }
      @keyframes aapa-pulse { 0%,100%{ transform:scale(1); filter:drop-shadow(0 0 6px rgba(251,191,36,0.35)); } 50%{ transform:scale(1.07); filter:drop-shadow(0 0 18px rgba(251,191,36,0.7)); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="aapa-splash">
        <svg class="m" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="50" fill="#0A2463"/>
          <path d="M45 35 L85 15 L78 28 L95 35 L78 40 L85 55 L65 40 Z" fill="#FBBF24"/>
          <path d="M50 75 Q35 60 15 65 L15 75 Q35 70 50 85 Q65 70 85 75 L85 65 Q65 60 50 75Z" fill="#E2E8F0"/>
          <path d="M50 65 Q35 50 15 55 L15 65 Q35 60 50 75 Q65 60 85 65 L85 55 Q65 50 50 65Z" fill="#FFF"/>
          <path d="M50 30 L15 45 L50 60 L85 45Z" fill="#1E3A8A"/>
          <path d="M50 35 L22 47 L50 55 L78 47Z" fill="#2563EB"/>
          <path d="M50 45 L70 50 L72 65" stroke="#FBBF24" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="72" cy="68" r="3.5" fill="#FBBF24"/>
        </svg>
        <div class="w">AAPA</div>
        <div class="s">Ad Astra Per Aspera</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
