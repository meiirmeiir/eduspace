<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AAPA</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- PWA: standalone на iOS (apple-mobile-web-app-capable) + иконка домашнего экрана -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AAPA" />
    <meta name="theme-color" content="#0A2463" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Preload жирного КИРИЛЛИЧЕСКОГО Montserrat 700: текст вопросов жирный, и если этот
     subset не успевает подгрузиться, кириллица рисуется как .notdef → «?????».
     URL version-pinned (v31) — при обновлении шрифта Google может протухнуть; тогда
     просто перестаёт работать preload, а CSS-fallback (Inter) в index.css всё равно
     гарантирует корректный рендер. -->
<link rel="preload" as="font" type="font/woff2" crossorigin
  href="https://fonts.gstatic.com/s/montserrat/v31/JTUHjIg1_i6t8kCHKm4532VJOt5-QNFgpCuM73w9aXpsog.woff2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
