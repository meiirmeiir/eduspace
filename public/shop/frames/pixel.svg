<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" shape-rendering="crispEdges">
  <!-- 8×8 grid размером 12px на ячейку. Каждая "ячейка" = квадратный пиксель.
       Рамка занимает ячейки по периметру с шахматной градацией оттенков
       зелёного — классическая 8-bit стилистика. -->

  <!-- Темно-зелёный фоновый ободок -->
  <g fill="#14532d">
    <!-- top row -->
    <rect x="0"  y="0"  width="12" height="12"/>
    <rect x="12" y="0"  width="12" height="12"/>
    <rect x="24" y="0"  width="12" height="12"/>
    <rect x="36" y="0"  width="12" height="12"/>
    <rect x="48" y="0"  width="12" height="12"/>
    <rect x="60" y="0"  width="12" height="12"/>
    <rect x="72" y="0"  width="12" height="12"/>
    <rect x="84" y="0"  width="12" height="12"/>
    <!-- bottom row -->
    <rect x="0"  y="84" width="12" height="12"/>
    <rect x="12" y="84" width="12" height="12"/>
    <rect x="24" y="84" width="12" height="12"/>
    <rect x="36" y="84" width="12" height="12"/>
    <rect x="48" y="84" width="12" height="12"/>
    <rect x="60" y="84" width="12" height="12"/>
    <rect x="72" y="84" width="12" height="12"/>
    <rect x="84" y="84" width="12" height="12"/>
    <!-- left col -->
    <rect x="0" y="12" width="12" height="12"/>
    <rect x="0" y="24" width="12" height="12"/>
    <rect x="0" y="36" width="12" height="12"/>
    <rect x="0" y="48" width="12" height="12"/>
    <rect x="0" y="60" width="12" height="12"/>
    <rect x="0" y="72" width="12" height="12"/>
    <!-- right col -->
    <rect x="84" y="12" width="12" height="12"/>
    <rect x="84" y="24" width="12" height="12"/>
    <rect x="84" y="36" width="12" height="12"/>
    <rect x="84" y="48" width="12" height="12"/>
    <rect x="84" y="60" width="12" height="12"/>
    <rect x="84" y="72" width="12" height="12"/>
  </g>

  <!-- Светло-зелёный «highlight» — внутренняя сторона ободка -->
  <g fill="#22c55e">
    <!-- top row inner -->
    <rect x="12" y="0"  width="12" height="6"/>
    <rect x="36" y="0"  width="12" height="6"/>
    <rect x="60" y="0"  width="12" height="6"/>
    <rect x="84" y="0"  width="6"  height="12"/>
    <!-- right col inner -->
    <rect x="90" y="12" width="6"  height="12"/>
    <rect x="90" y="36" width="6"  height="12"/>
    <rect x="90" y="60" width="6"  height="12"/>
    <rect x="90" y="84" width="6"  height="12"/>
    <!-- bottom row inner -->
    <rect x="72" y="90" width="12" height="6"/>
    <rect x="48" y="90" width="12" height="6"/>
    <rect x="24" y="90" width="12" height="6"/>
    <rect x="0"  y="90" width="6"  height="6"/>
    <!-- left col inner -->
    <rect x="0"  y="72" width="6"  height="12"/>
    <rect x="0"  y="48" width="6"  height="12"/>
    <rect x="0"  y="24" width="6"  height="12"/>
  </g>

  <!-- Яркие «4 угла» — character-portrait style corners -->
  <g fill="#bbf7d0">
    <rect x="0"  y="0"  width="12" height="6"/>
    <rect x="0"  y="0"  width="6"  height="12"/>
    <rect x="84" y="0"  width="12" height="6"/>
    <rect x="90" y="0"  width="6"  height="12"/>
    <rect x="84" y="90" width="12" height="6"/>
    <rect x="90" y="84" width="6"  height="12"/>
    <rect x="0"  y="90" width="12" height="6"/>
    <rect x="0"  y="84" width="6"  height="12"/>
  </g>
</svg>
