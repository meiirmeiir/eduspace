<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- Огонь: жёлто-оранжево-красный градиент изнутри наружу -->
    <radialGradient id="fire-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="35%"  stop-color="#fbbf24"/>
      <stop offset="70%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </radialGradient>
    <linearGradient id="flame-vert" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <!-- Маска: видна только тонкое кольцо вокруг аватара (r 38–48) -->
    <mask id="ring-mask">
      <rect width="96" height="96" fill="black"/>
      <circle cx="48" cy="48" r="48" fill="white"/>
      <circle cx="48" cy="48" r="38" fill="black"/>
    </mask>
  </defs>

  <!-- Основное кольцо с градиентом -->
  <g mask="url(#ring-mask)">
    <circle cx="48" cy="48" r="48" fill="url(#fire-core)"/>
  </g>

  <!-- 12 огненных языков, выходящих наружу за круг (как пламя пляшет) -->
  <g fill="url(#flame-vert)" stroke="none">
    <!-- top -->
    <path d="M 48 0 Q 51 6 48 14 Q 45 6 48 0 Z"/>
    <!-- top-right 30° -->
    <path d="M 71 6 Q 71 14 65 19 Q 67 12 71 6 Z" transform="rotate(15 48 48)"/>
    <!-- right 60° -->
    <path d="M 90 25 Q 84 28 78 25 Q 84 22 90 25 Z" transform="rotate(30 48 48)"/>
    <!-- right -->
    <path d="M 96 48 Q 90 51 82 48 Q 90 45 96 48 Z"/>
    <!-- bottom-right -->
    <path d="M 90 71 Q 84 74 78 71 Q 84 68 90 71 Z" transform="rotate(-30 48 48)"/>
    <!-- bottom -->
    <path d="M 48 96 Q 51 90 48 82 Q 45 90 48 96 Z"/>
    <!-- bottom-left -->
    <path d="M 6 71 Q 12 74 18 71 Q 12 68 6 71 Z" transform="rotate(30 48 48)"/>
    <!-- left -->
    <path d="M 0 48 Q 6 51 14 48 Q 6 45 0 48 Z"/>
    <!-- top-left -->
    <path d="M 6 25 Q 12 28 18 25 Q 12 22 6 25 Z" transform="rotate(-30 48 48)"/>
    <!-- extra detail flames -->
    <path d="M 48 0 Q 53 8 48 18 Q 43 8 48 0 Z" transform="rotate(45 48 48)" opacity="0.85"/>
    <path d="M 48 0 Q 53 8 48 18 Q 43 8 48 0 Z" transform="rotate(135 48 48)" opacity="0.85"/>
    <path d="M 48 0 Q 53 8 48 18 Q 43 8 48 0 Z" transform="rotate(225 48 48)" opacity="0.85"/>
    <path d="M 48 0 Q 53 8 48 18 Q 43 8 48 0 Z" transform="rotate(315 48 48)" opacity="0.85"/>
  </g>

  <!-- Внутренняя обводка: ярко-жёлтая, отделяет огонь от аватара -->
  <circle cx="48" cy="48" r="38" fill="none" stroke="#fde68a" stroke-width="1"/>
</svg>
