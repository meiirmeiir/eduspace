<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- Радужный градиент через 7 цветов спектра. SVG не умеет conic-gradient
         нативно, поэтому имитируем через 8-сегментное кольцо.
         Альтернатива - линейный градиент по диагонали (упрощённо). -->
    <linearGradient id="rb-tl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ef4444"/>
      <stop offset="50%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="rb-tr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#facc15"/>
      <stop offset="50%"  stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="rb-br" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="rb-bl" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <!-- Маска: кольцо r 36..48 -->
    <mask id="rb-mask">
      <rect width="96" height="96" fill="black"/>
      <circle cx="48" cy="48" r="48" fill="white"/>
      <circle cx="48" cy="48" r="36" fill="black"/>
    </mask>
  </defs>

  <!-- 4 квадранта с разными участками спектра, маска ограничивает в кольцо.
       Покрытие всё кольцо склеивается в радугу по часовой стрелке. -->
  <g mask="url(#rb-mask)">
    <rect x="0"  y="0"  width="48" height="48" fill="url(#rb-tl)"/>
    <rect x="48" y="0"  width="48" height="48" fill="url(#rb-tr)"/>
    <rect x="48" y="48" width="48" height="48" fill="url(#rb-br)"/>
    <rect x="0"  y="48" width="48" height="48" fill="url(#rb-bl)"/>
  </g>

  <!-- Тонкие внутренний/внешний контуры для читаемости границ -->
  <circle cx="48" cy="48" r="47.5" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
  <circle cx="48" cy="48" r="36"   fill="none" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
</svg>
