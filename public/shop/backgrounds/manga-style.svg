       Inner gap r=120 keeps the centre clear (focal "punch zone").
       Mixed lengths/widths for hand-drawn feel.
       ─────────────────────────────────────────────────────────── -->
  <g transform="translate(960 540)" stroke="#0a0a0a" stroke-linecap="butt">
    <line x1="160"  y1="0" x2="1100" y2="0" stroke-width="1.6" transform="rotate(0)"/>
    <line x1="180"  y1="0" x2="900"  y2="0" stroke-width="2.2" transform="rotate(7)"/>
    <line x1="140"  y1="0" x2="1180" y2="0" stroke-width="1.2" transform="rotate(13)"/>
    <line x1="170"  y1="0" x2="980"  y2="0" stroke-width="2.6" transform="rotate(21)"/>
    <line x1="155"  y1="0" x2="1080" y2="0" stroke-width="1.4" transform="rotate(28)"/>
    <line x1="190"  y1="0" x2="860"  y2="0" stroke-width="1.8" transform="rotate(36)"/>
    <line x1="160"  y1="0" x2="1140" y2="0" stroke-width="2.8" transform="rotate(43)"/>
