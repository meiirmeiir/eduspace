  <!-- ─────────────────────────────────────────────────────────
       SHARP GEOMETRY: ink-bar slashes at TL/BR corners.
       Sharp angular shapes that read as "ink stroke" overlays.
       ─────────────────────────────────────────────────────────── -->
  <!-- Top-left corner ink wedge -->
  <polygon points="0,0 520,0 0,160" fill="#0a0a0a"/>
  <polygon points="0,180 320,0 380,0 0,260" fill="#0a0a0a"/>

  <!-- Bottom-right corner ink wedge -->
  <polygon points="1920,1080 1400,1080 1920,920" fill="#0a0a0a"/>
  <polygon points="1920,900 1600,1080 1540,1080 1920,820" fill="#0a0a0a"/>

  <!-- Diagonal accent bar across mid-frame, top-right to centre -->
  <polygon points="1500,40 1700,40 1140,540 1080,540" fill="#0a0a0a" opacity="0.85"/>

  <!-- Central focal "boom" ring — thin ink circle for action emphasis -->
  <circle cx="960" cy="540" r="105" fill="none" stroke="#0a0a0a" stroke-width="3"/>
  <circle cx="960" cy="540" r="118" fill="none" stroke="#0a0a0a" stroke-width="1"/>
