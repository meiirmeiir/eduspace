    <line x1="170"  y1="0" x2="1100" y2="0" stroke-width="3.0" transform="rotate(300)"/>
    <line x1="190"  y1="0" x2="1000" y2="0" stroke-width="1.2" transform="rotate(308)"/>
    <line x1="150"  y1="0" x2="1140" y2="0" stroke-width="2.2" transform="rotate(316)"/>
    <line x1="160"  y1="0" x2="860"  y2="0" stroke-width="1.6" transform="rotate(323)"/>
