    <line x1="190"  y1="0" x2="1080" y2="0" stroke-width="2.4" transform="rotate(90)"/>
    <line x1="170"  y1="0" x2="960"  y2="0" stroke-width="1.6" transform="rotate(98)"/>
    <line x1="145"  y1="0" x2="1140" y2="0" stroke-width="2.0" transform="rotate(105)"/>
    <line x1="165"  y1="0" x2="1000" y2="0" stroke-width="1.2" transform="rotate(112)"/>
