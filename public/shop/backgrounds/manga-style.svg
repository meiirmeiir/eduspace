       ─────────────────────────────────────────────────────────── -->
  <!-- TOP-LEFT -->
  <g fill="#0a0a0a">
    <circle cx="36"  cy="36"  r="14"/>
    <circle cx="92"  cy="36"  r="12"/>
    <circle cx="148" cy="36"  r="10"/>
    <circle cx="204" cy="36"  r="7"/>
    <circle cx="260" cy="36"  r="5"/>
    <circle cx="316" cy="36"  r="3"/>
    <circle cx="372" cy="36"  r="1.5"/>
    <circle cx="36"  cy="92"  r="12"/>
    <circle cx="92"  cy="92"  r="11"/>
    <circle cx="148" cy="92"  r="8"/>
    <circle cx="204" cy="92"  r="6"/>
    <circle cx="260" cy="92"  r="4"/>
    <circle cx="316" cy="92"  r="2.5"/>
    <circle cx="36"  cy="148" r="10"/>
    <circle cx="92"  cy="148" r="8"/>
    <circle cx="148" cy="148" r="6"/>
    <circle cx="204" cy="148" r="4.5"/>
    <circle cx="260" cy="148" r="3"/>
    <circle cx="36"  cy="204" r="7"/>
    <circle cx="92"  cy="204" r="6"/>
    <circle cx="148" cy="204" r="4.5"/>
    <circle cx="204" cy="204" r="3"/>
    <circle cx="36"  cy="260" r="5"/>
    <circle cx="92"  cy="260" r="4"/>
    <circle cx="148" cy="260" r="3"/>
    <circle cx="36"  cy="316" r="3"/>
    <circle cx="92"  cy="316" r="2.5"/>
    <circle cx="36"  cy="372" r="1.5"/>
  </g>

  <!-- TOP-RIGHT (mirror x around 1920) -->
  <g fill="#0a0a0a" transform="translate(1920 0) scale(-1 1)">
    <circle cx="36"  cy="36"  r="14"/>
    <circle cx="92"  cy="36"  r="12"/>
    <circle cx="148" cy="36"  r="10"/>
    <circle cx="204" cy="36"  r="7"/>
    <circle cx="260" cy="36"  r="5"/>
    <circle cx="316" cy="36"  r="3"/>
    <circle cx="372" cy="36"  r="1.5"/>
    <circle cx="36"  cy="92"  r="12"/>
    <circle cx="92"  cy="92"  r="11"/>
    <circle cx="148" cy="92"  r="8"/>
    <circle cx="204" cy="92"  r="6"/>
    <circle cx="260" cy="92"  r="4"/>
    <circle cx="316" cy="92"  r="2.5"/>
    <circle cx="36"  cy="148" r="10"/>
    <circle cx="92"  cy="148" r="8"/>
    <circle cx="148" cy="148" r="6"/>
    <circle cx="204" cy="148" r="4.5"/>
    <circle cx="260" cy="148" r="3"/>
    <circle cx="36"  cy="204" r="7"/>
    <circle cx="92"  cy="204" r="6"/>
    <circle cx="148" cy="204" r="4.5"/>
    <circle cx="204" cy="204" r="3"/>
    <circle cx="36"  cy="260" r="5"/>
